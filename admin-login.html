<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b0b0f;
      --card:#141414;
      --text:#f5f5f7;
      --muted:rgba(245,245,247,.65);
      --border:rgba(255,255,255,.09);
      --red:#e50914;
      --red2:#b20710;
      --green:#22c55e;
      --danger:#ff6b6b;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 400px at 15% 10%, rgba(229,9,20,.18), transparent 55%),
        radial-gradient(900px 400px at 90% 20%, rgba(255,42,42,.08), transparent 60%),
        var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .card{
      width:min(430px, 100%);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid var(--border);
      border-radius:22px;
      padding:22px;
      box-shadow:0 24px 60px rgba(0,0,0,.4);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }

    .logo{
      width:42px;
      height:42px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--red),#ff5a36);
      box-shadow:0 16px 36px rgba(229,9,20,.24);
      flex-shrink:0;
    }

    .title{
      font-size:24px;
      font-weight:900;
      margin:0;
      line-height:1.1;
    }

    .sub{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    .field{
      margin-bottom:12px;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:var(--muted);
    }

    input{
      width:100%;
      padding:12px 13px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:#fff;
      outline:none;
      font-size:14px;
    }

    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    button, a.btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:140px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      font-size:14px;
      font-weight:800;
      text-decoration:none;
      cursor:pointer;
      transition:.18s ease;
    }

    button{
      background:linear-gradient(180deg,var(--red),var(--red2));
      color:#fff;
      border-color:rgba(229,9,20,.35);
    }

    button:hover,
    a.btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .ghost{
      background:rgba(255,255,255,.05);
      color:#fff;
    }

    .msg{
      display:none;
      margin-top:12px;
      padding:11px 12px;
      border-radius:12px;
      font-size:13px;
      line-height:1.45;
      border:1px solid var(--border);
    }

    .msg.ok{
      display:block;
      background:rgba(34,197,94,.12);
      border-color:rgba(34,197,94,.25);
      color:#d5ffe0;
    }

    .msg.bad{
      display:block;
      background:rgba(255,90,90,.10);
      border-color:rgba(255,90,90,.24);
      color:#ffd0d0;
    }

    .small{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
    }

    @media (max-width: 560px){
      .card{
        padding:18px;
        border-radius:18px;
      }

      .title{
        font-size:22px;
      }

      .btns{
        flex-direction:column;
      }

      button, a.btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1 class="title">Admin Login</h1>
        <p class="sub">Sign in to access the admin panel</p>
      </div>
    </div>

    <div class="field">
      <label>Admin username</label>
      <input id="adminUser" placeholder="admin" />
    </div>

    <div class="field">
      <label>Admin password</label>
      <input id="adminPass" type="password" placeholder="••••••••" />
    </div>

    <div class="btns">
      <button id="loginBtn" onclick="adminLogin()" type="button">Login</button>
      <a class="btn ghost" href="/index.html">Back</a>
    </div>

    <div id="msg" class="msg"></div>

    <div class="small">
      After successful login, you will be redirected to the admin panel.
    </div>
  </div>

  <script>
    const API = window.location.origin;

    function setMsg(text, ok = false){
      const el = document.getElementById("msg");
      el.className = "msg " + (ok ? "ok" : "bad");
      el.textContent = text;
      el.style.display = "block";
    }

    function clearMsg(){
  const el = document.getElementById("msg");
  el.className = "msg";
  el.textContent = "";
  el.style.display = "none";
}

    async function adminLogin(){
      const username = document.getElementById("adminUser").value.trim();
      const password = document.getElementById("adminPass").value;
      const loginBtn = document.getElementById("loginBtn");
     clearMsg();
      if(!username || !password){
        return setMsg("Enter username and password.");
      }

      try{
        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        const res = await fetch(`${API}/api/movies/admin-login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json().catch(() => ({}));

        if(!res.ok){
          return setMsg(data.message || `Login failed (${res.status})`);
        }

        localStorage.setItem("admin_token", data.token);
        setMsg("Login successful.", true);
window.location.href = "/admin.html";

      }catch(e){
        console.error(e);
        setMsg("Server error.");
      }finally{
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    }

    ["adminUser", "adminPass"].forEach((id) => {
  const el = document.getElementById(id);
  if (!el) return;

  el.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      adminLogin();
    }
  });
});

    if(localStorage.getItem("admin_token")){
      window.location.href = "/admin.html";
    }
  </script>
</body>
</html>
