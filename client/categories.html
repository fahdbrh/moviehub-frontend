<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub - Categories</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Banner Ad -->
    <section class="ad-space top-banner">
        <div class="ad-placeholder">Top Banner Ad</div>
    </section>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">MovieHub</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="movies.html">Movies</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="#">Search</a></li>
            <li><a href="#">Login</a></li>
        </ul>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <h1>Movie Categories</h1>
    </header>

    <!-- Category Cards Section -->
    <section class="categories-section">
        <div class="category-cards">
            <a href="movies.html?category=action" class="category-card">Action</a>
            <a href="movies.html?category=comedy" class="category-card">Comedy</a>
            <a href="movies.html?category=drama" class="category-card">Drama</a>
            <a href="movies.html?category=horror" class="category-card">Horror</a>
            <a href="movies.html?category=sci-fi" class="category-card">Sci-Fi</a>
        </div>

        <!-- Ad Between Category Cards -->
        <div class="ad-space between-cards">
            <div class="ad-placeholder">Ad Between Category Cards</div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
        </div>
    </footer>

    <script src="script.js"></script>

</html>
